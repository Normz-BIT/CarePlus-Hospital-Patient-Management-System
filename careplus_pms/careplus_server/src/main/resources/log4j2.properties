name = PropertiesConfig
status = ERROR


property.baseDir = ./logs

filters = threshold
filter.threshold.type = ThresholdFilter
filter.threshold.level = all

# Appenders list
appenders = rolling, console

#Rolling File Appender
appender.rolling.type = RollingFile
appender.rolling.name = RollingFileLogger
appender.rolling.filename = ${baseDir}/rolling.log
appender.rolling.filepattern = ${baseDir}/rolling-%d{yyyy-MM-dd}-%i.log.gz
appender.rolling.layout.type = PatternLayout
appender.rolling.layout.pattern = [%-5level] %d{yyyy-MM-dd HH:mm:ss} %-5p %c{1}:%l - %m%n

appender.rolling.policies.type = Policies

# Daily Time Policy
appender.rolling.policies.time.type = TimeBasedTriggeringPolicy
appender.rolling.policies.time.interval = 1
appender.rolling.policies.time.modulate = true

# 100MB Size Policy
appender.rolling.policies.size.type = SizeBasedTriggeringPolicy
appender.rolling.policies.size.size = 100MB

# Keep 5 rolled files max
appender.rolling.strategy.type = DefaultRolloverStrategy
appender.rolling.strategy.delete.type = Delete
appender.rolling.strategy.delete.basepath = ${baseDir}
appender.rolling.strategy.delete.maxdepth = 1
appender.rolling.strategy.delete.iffilename.type = IfFileName
appender.rolling.strategy.delete.iffilename.glob = rolling-*.log.gz
appender.rolling.strategy.delete.ifaccumulatedfilecount.type = IfAccumulatedFileCount
appender.rolling.strategy.delete.ifaccumulatedfilecount.exceeds = 28

#Console Appender
appender.console.type = Console
appender.console.name = STDOUT
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = [%-5level] %d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %c{1} - %msg%n

# Loggers Registration
loggers = server, common

# Server application packages (controller, net, service, util, view inherit from this)
logger.server.name = com.careplus.server
logger.server.level = ALL
logger.server.additivity = false
logger.server.appenderRef.rolling.ref = RollingFileLogger
logger.server.appenderRef.console.ref = STDOUT

# Shared code invoked from the server JVM
logger.common.name = com.careplus.common
logger.common.level = ALL
logger.common.additivity = false
logger.common.appenderRef.rolling.ref = RollingFileLogger
logger.common.appenderRef.console.ref = STDOUT

#Root Logger Configuration - third-party libraries only
rootLogger.level = WARN
rootLogger.appenderRef.stdout.ref = STDOUT
rootLogger.appenderRef.rolling.ref = RollingFileLogger
